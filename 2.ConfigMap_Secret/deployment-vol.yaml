apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-demo-vol
  labels:
    app: config-demo
  annotations:
    description: "ConfigMap/Secret을 볼륨 마운트로 주입하는 실습"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-demo
      inject-type: volume
  template:
    metadata:
      labels:
        app: config-demo
        inject-type: volume
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/conf.d
            - name: secret-volume
              mountPath: /etc/app-secret
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: app-config
            items:
              - key: nginx.conf
                path: default.conf
        - name: secret-volume
          secret:
            secretName: app-secret
