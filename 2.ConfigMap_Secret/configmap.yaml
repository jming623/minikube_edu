apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: config-demo
data:
  APP_ENV: "development"
  APP_LOG_LEVEL: "debug"
  APP_PORT: "8080"
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            return 200 'ConfigMap Volume Mount Test OK\n';
            add_header Content-Type text/plain;
        }
    }
