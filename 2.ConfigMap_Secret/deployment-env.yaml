apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-demo-env
  labels:
    app: config-demo
  annotations:
    description: "ConfigMap/Secret을 환경변수로 주입하는 실습"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-demo
      inject-type: env
  template:
    metadata:
      labels:
        app: config-demo
        inject-type: env
    spec:
      containers:
        - name: busybox
          image: busybox:1.36
          command: ["sh", "-c", "echo '=== Environment Variables ===' && env | grep -E 'APP_|DB_' && sleep 3600"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
